    name: 'Count Plants in Spreadsheet'
    family: xlsx
    primary_tag: 'Cross-sheet/file Retrieval'
    difficulty: easy
    task_type: QA
    max_steps: 15
    grader:
      type: programmatic
      description: "QA (xlsx) — extract numbers from agent's text answer, compare against reference value. 80% numeric match (5% tolerance) + 20% keyword overlap. Score 0.001-0.999."

